
map $http_cf_connecting_ip $zt_client {
    ""      $binary_remote_addr;
    default $http_cf_connecting_ip;
}

limit_req_zone  $zt_client  zone=zt_submit:10m   rate=1r/s;
limit_req_zone  $zt_client  zone=zt_general:10m  rate=20r/s;
limit_conn_zone $zt_client  zone=zt_conns:10m;

server {
    listen 80;
    server_name _;

    limit_conn zt_conns 20;

    location = /api/request {
        limit_req                 zone=zt_submit burst=5 nodelay;  # absorb floods at the edge
        limit_except POST OPTIONS { deny all; }                    # OPTIONS = CORS preflight
        client_max_body_size      4k;
        client_body_timeout       10s;

        proxy_pass         http://zerotwo-api:8787;     # the Node service (compose name)
        proxy_set_header   CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header   X-Real-IP $zt_client;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    location /api/ {
        limit_req zone=zt_general burst=10 nodelay;
        client_max_body_size 4k;

        proxy_pass         http://zerotwo-api:8787;
        proxy_set_header   CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header   X-Real-IP $zt_client;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    location / { return 404; }   # no page here  -  the dashboard lives on SiteGround
}
